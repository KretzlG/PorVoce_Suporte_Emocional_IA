<!DOCTYPE html>
<html lang="pt-br">

<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/csss/styleGlobal.css">
    <link rel="stylesheet" href="cadastro.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"> <!--uma bootsstrap para os incones de nome e email-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"> <!--uma bootstrap para os icones de mostrar a senha-->

</head>

<body>

    <main class="container">

        <form>

            <h1>Login</h1>
            
            <div class="input-box">
                <input placeholder="Email" type="email">
                <i class="bx bxs-user"></i>
            </div>
             <div class="input-box">
                <input placeholder="Senha" type="password" id="senha">
                <i class="bi bi-eye-fill" id="btn-senha" onclick="mostrarSenha()"></i>
            </div>
            </div>

            <button type="submit" class="login"><a href="#">Entrar</a></button>

        
            <script src="login.js"></script>
        </form>

    </main>

</body>

</html>
